grumphp:
  extensions:
    - YieldStudio\GrumPHPLaravelPint\ExtensionLoader
  tasks:
    npm_script:
      script: typecheck
      is_run_task: true
      triggered_by: ['ts', 'tsx']
    eslint:
      bin: node_modules/.bin/eslint
      triggered_by: ['js', 'ts', 'tsx']
      whitelist_patterns: ['resources/js/']
      max_warnings: 0
    laravel_pint: null
    phpstan:
      autoload_file: ~
      configuration: phpstan.neon
      level: 5
      force_patterns: []
      ignore_patterns: ['tests/', 'config/', 'routes/']
      triggered_by: ['php']
      memory_limit: "-1"
      use_grumphp_paths: true
    composer:
      file: ./composer.json
      no_check_publish: true
    pest:
      config_file: ~
      testsuite: ~
      group: []
      always_execute: false
  testsuites:
    git_commit:
      tasks:
        - npm_script
        - eslint
        - phpstan
        - laravel_pint
        - pest
