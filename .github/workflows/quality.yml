name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      CACHE_STORE: array
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      PULSE_ENABLED: "false"
      TELESCOPE_ENABLED: "false"
      NIGHTWATCH_ENABLED: "false"

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan config:clear

      - name: Install Node dependencies
        run: npm install

      - name: Install Linux native build bindings
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.0.0-rc.10 lightningcss-linux-x64-gnu@1.32.0 @tailwindcss/oxide-linux-x64-gnu@4.2.2

      - name: Run frontend typecheck
        run: npm run typecheck
      - name: Build frontend assets
        run: npm run build

      - name: Run quality checks
        run: vendor/bin/grumphp run
